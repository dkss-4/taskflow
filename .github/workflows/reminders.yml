name: Send Daily Task Reminders

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST
  workflow_dispatch:  # Manual trigger - USE THIS FOR TESTING

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary dj-database-url gunicorn
      
      - name: Verify database connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
import os, sys
try:
    import dj_database_url
    import psycopg2
    print('✅ Modules imported')
    url = os.environ.get('DATABASE_URL')
    if url:
        print('✅ DATABASE_URL found')
    else:
        print('❌ DATABASE_URL missing')
        sys.exit(1)
except Exception as e:
    print(f'❌ Error: {e}')
    sys.exit(1)
"
      
      - name: Run reminder command
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DEBUG: "False"
          ALLOWED_HOSTS: "taskflow-sqsv.onrender.com"
        run: |
          python manage.py send_reminders