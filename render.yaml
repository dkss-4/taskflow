services:
  - type: web
    name: taskflow
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn taskflow.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow_db
          property: connectionString

  - type: cron
    name: taskflow-reminders
    schedule: "0 9 * * *"  # Every day at 9 AM
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py send_reminders
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow_db
          property: connectionString